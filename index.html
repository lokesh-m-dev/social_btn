<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QATouch Share</title>

<!-- ✅ Open Graph Meta Tags (LinkedIn uses this) -->
<meta property="og:title" content="QATouch - Test Management Tool">
<meta property="og:description" content="Powerful test management tool for QA teams to manage test cases, execution and reports.">
<meta property="og:image" content="https://help.qatouch.com/assets/integration-qatouch.png">
<meta property="og:url" content="https://www.qatouch.com/">
<meta property="og:type" content="website">

<style>
body {
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #f5f7fa;
}

.social-share {
  display: flex;
  gap: 10px;
}

.social-share a {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  border-radius: 8px;
  color: white;
  text-decoration: none;
  font-size: 15px;
  background: #0077b5;
  transition: 0.3s;
}

.social-share a:hover {
  transform: translateY(-3px);
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="social-share">
  <a 
    href="https://www.linkedin.com/sharing/share-offsite/?url=https://www.qatouch.com/&title=AI Test Case Management Tool&summary=tesing the solical button for testimonial&source=" 
    target="_blank" 
    rel="noopener noreferrer">
    🔗 Share on LinkedIn
  </a>
</div>
</body>
</html>
